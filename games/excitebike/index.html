<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXCITEBIKE — arcade</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fafafa;font-family:'Press Start 2P',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;user-select:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px)}

.back-btn{position:fixed;top:1.25rem;left:1.25rem;color:#888;text-decoration:none;
  font-family:'Press Start 2P',monospace;font-size:.65rem;z-index:100;
  transition:color .2s}
.back-btn:hover{color:#fafafa}

.mute-btn{position:fixed;top:1.25rem;right:1.25rem;background:none;border:1px solid #333;
  color:#888;font-family:'Press Start 2P',monospace;font-size:.55rem;padding:.4rem .7rem;
  border-radius:4px;cursor:pointer;z-index:100;transition:color .2s,border-color .2s}
.mute-btn:hover{color:#fafafa;border-color:#fafafa}
.mute-btn.muted{color:#ef4444;border-color:#ef4444}

#game-wrap{display:flex;flex-direction:column;align-items:center;gap:.75rem}
#title{font-size:1.1rem;letter-spacing:2px;color:#f97316;text-shadow:0 0 20px rgba(249,115,22,0.5)}
canvas{border:2px solid #333;border-radius:4px;image-rendering:pixelated;
  max-width:95vw;max-height:70vh}
#controls-hint{font-size:.45rem;color:#555;text-align:center;line-height:1.8}

/* HUD */
#hud{display:flex;gap:2rem;font-size:.5rem;color:#aaa;margin-bottom:0.25rem}
#hud span{color:#f97316}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  opacity:0;pointer-events:none;transition:opacity .4s;z-index:50}
#overlay.show{opacity:1;pointer-events:auto}
#overlay-title{font-size:1.2rem;color:#f97316;text-shadow:0 0 20px rgba(249,115,22,0.4)}
#overlay-score,#overlay-best{font-size:.6rem;color:#ccc}
#overlay a,#overlay button{font-family:'Press Start 2P',monospace;font-size:.55rem;
  padding:.6rem 1.2rem;border:1px solid #f97316;background:transparent;color:#f97316;
  text-decoration:none;border-radius:4px;cursor:pointer;transition:background .2s,color .2s}
#overlay a:hover,#overlay button:hover{background:#f97316;color:#0a0a0a}

/* Start screen */
#start-screen{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:60}
#start-screen .title{font-size:1.4rem;color:#f97316;text-shadow:0 0 30px rgba(249,115,22,0.5)}
#start-screen .sub{font-size:.5rem;color:#888;animation:blink 1.2s infinite}
#start-screen .info{font-size:.4rem;color:#555;text-align:center;line-height:2}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<a class="back-btn" href="../../index.html#games">← BACK</a>
<button class="mute-btn" id="muteBtn">♪ SFX</button>

<div id="start-screen">
  <div class="title">EXCITEBIKE</div>
  <div class="info">↑↓ SWITCH LANES &nbsp;|&nbsp; HOLD → ACCELERATE<br>
    HOLD SHIFT TURBO BOOST &nbsp;|&nbsp; ← BRAKE<br>
    SPACE WHEELIE ON RAMPS</div>
  <div class="sub">PRESS ENTER OR TAP TO START</div>
</div>

<div id="game-wrap">
  <div id="title">EXCITEBIKE</div>
  <div id="hud">
    <div>TIME <span id="hud-time">0.0</span></div>
    <div>SPEED <span id="hud-speed">0</span></div>
    <div>LAP <span id="hud-lap">1/3</span></div>
    <div>HEAT <span id="hud-heat">▓░░░░</span></div>
  </div>
  <canvas id="canvas" width="800" height="400"></canvas>
  <div id="controls-hint">↑↓ Lane &nbsp;|&nbsp; → Accel &nbsp;|&nbsp; ← Brake &nbsp;|&nbsp; SHIFT Turbo &nbsp;|&nbsp; SPACE Wheelie</div>
</div>

<div id="overlay">
  <div id="overlay-title">RACE COMPLETE</div>
  <div id="overlay-score"></div>
  <div id="overlay-best"></div>
  <button id="newGameBtn">RACE AGAIN</button>
  <a href="../../index.html#games">← ARCADE</a>
</div>

<script type="module">
import { getDifficulty } from '../../utils/difficulty.js';
import { saveScore, playHighScoreChime, showHighScoreBanner } from '../../utils/scores.js';

/* ── Audio ──────────────────────────────────────────── */
let muted = false;
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq,type,dur,vol=0.15,delay=0){
  if(muted) return;
  try{
    const ctx=getAudio(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type=type; osc.frequency.setValueAtTime(freq,ctx.currentTime+delay);
    g.gain.setValueAtTime(vol,ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay); osc.stop(ctx.currentTime+delay+dur+0.01);
  }catch(_){}
}
function noise(dur,vol=0.08){
  if(muted) return;
  try{
    const ctx=getAudio(), buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*vol;
    const src=ctx.createBufferSource(), g=ctx.createGain();
    src.buffer=buf; src.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
    src.start(); src.stop(ctx.currentTime+dur+0.01);
  }catch(_){}
}

const sfx = {
  engine: () => tone(80+Math.random()*20,'sawtooth',0.08,0.04),
  turbo: () => tone(120+Math.random()*30,'square',0.06,0.06),
  jump: () => { tone(300,'square',0.1,0.12); tone(450,'square',0.08,0.1,0.06); },
  land: () => tone(100,'sawtooth',0.12,0.1),
  crash: () => { noise(0.3,0.15); tone(80,'sawtooth',0.25,0.12); },
  overheat: () => { tone(200,'square',0.08,0.08); tone(150,'square',0.08,0.06,0.08); },
  lapDone: () => { [440,554,659].forEach((f,i) => tone(f,'square',0.12,0.1,i*0.1)); },
  finish: () => { [523,659,784,1047].forEach((f,i) => tone(f,'square',0.18,0.12,i*0.12)); },
};

let engineTimer = 0;

document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted;
  const b=document.getElementById('muteBtn');
  b.textContent=muted?'✕ SFX':'♪ SFX';
  b.classList.toggle('muted',muted);
});

/* ── Difficulty ─────────────────────────────────────── */
const diffKey = new URLSearchParams(location.search).get('difficulty') || getDifficulty();
const DIFF = {
  easy:   { maxSpeed:6, turboMax:9, accel:0.04, turboAccel:0.07, heatRate:0.004, coolRate:0.003, aiCount:3, aiSpeed:4.5, laps:2, obstacleDensity:0.6, scoreMultiplier:1 },
  normal: { maxSpeed:7, turboMax:11, accel:0.035, turboAccel:0.06, heatRate:0.006, coolRate:0.0025, aiCount:5, aiSpeed:5.5, laps:3, obstacleDensity:1.0, scoreMultiplier:1.5 },
  hard:   { maxSpeed:8, turboMax:13, accel:0.03, turboAccel:0.055, heatRate:0.008, coolRate:0.002, aiCount:7, aiSpeed:6.5, laps:3, obstacleDensity:1.4, scoreMultiplier:2 },
}[diffKey] || { maxSpeed:7, turboMax:11, accel:0.035, turboAccel:0.06, heatRate:0.006, coolRate:0.0025, aiCount:5, aiSpeed:5.5, laps:3, obstacleDensity:1.0, scoreMultiplier:1.5 };

/* ── Constants ──────────────────────────────────────── */
const W = 800, H = 400;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const LANE_COUNT = 4;
const TRACK_TOP = 120;
const TRACK_BOTTOM = 340;
const LANE_H = (TRACK_BOTTOM - TRACK_TOP) / LANE_COUNT;
const PLAYER_X = 150;
const TRACK_LENGTH = 6000;
const GRAVITY = 0.4;

/* ── Track generation ───────────────────────────────── */
function generateTrack(){
  const obstacles = [];
  const types = ['ramp_small','ramp_big','mud','bump','ai_rider'];
  const spacing = 200 / DIFF.obstacleDensity;
  for(let x = 400; x < TRACK_LENGTH - 300; x += spacing + Math.random()*150){
    const type = types[Math.floor(Math.random()*types.length)];
    const lane = Math.floor(Math.random()*LANE_COUNT);
    obstacles.push({ x, lane, type });
    // Sometimes add obstacles in adjacent lanes
    if(Math.random() < 0.3 && type !== 'ai_rider'){
      const lane2 = (lane + 1) % LANE_COUNT;
      obstacles.push({ x: x + Math.random()*40 - 20, lane: lane2, type });
    }
  }
  return obstacles;
}

/* ── AI Riders ──────────────────────────────────────── */
function createAI(){
  const riders = [];
  for(let i = 0; i < DIFF.aiCount; i++){
    riders.push({
      x: 100 + Math.random()*200,
      lane: Math.floor(Math.random()*LANE_COUNT),
      speed: DIFF.aiSpeed * (0.8 + Math.random()*0.4),
      color: ['#ef4444','#3b82f6','#22c55e','#a855f7','#facc15','#ec4899','#14b8a6'][i % 7],
      targetLane: Math.floor(Math.random()*LANE_COUNT),
      laneTimer: 0,
      jumpZ: 0,
      jumpVel: 0,
    });
  }
  return riders;
}

/* ── Game State ─────────────────────────────────────── */
let state = 'start'; // start, racing, crashed, cooldown, finished
let player, obstacles, aiRiders, raceTime, lap, scrollX;
let rafId, keys = {};
let bestScore = parseInt(localStorage.getItem('excitebike_best') || '0');

function resetGame(){
  player = {
    lane: 1, targetLane: 1, laneProgress: 0,
    speed: 0, jumpZ: 0, jumpVel: 0,
    heat: 0, overheated: false,
    crashed: false, crashTimer: 0,
    wheelie: false, wheelieTimer: 0,
    distance: 0,
  };
  obstacles = generateTrack();
  aiRiders = createAI();
  raceTime = 0;
  lap = 1;
  scrollX = 0;
  state = 'racing';
  engineTimer = 0;
  document.getElementById('overlay').classList.remove('show');
}

/* ── Input ──────────────────────────────────────────── */
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code === 'Enter' && state === 'start') startGame();
  if(e.code === 'Enter' && state === 'finished') resetGame();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch support
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  if(state === 'start') startGame();
  if(state === 'finished') resetGame();
  if(state === 'racing'){
    keys['ArrowRight'] = true;
    // Tap right half = turbo
    if(e.touches[0].clientX > window.innerWidth/2) keys['ShiftLeft'] = true;
  }
});
document.addEventListener('touchend', () => {
  keys['ArrowRight'] = false;
  keys['ShiftLeft'] = false;
});
document.addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if(Math.abs(dy) > 30){
    if(dy < 0) { keys['ArrowUp'] = true; setTimeout(()=>keys['ArrowUp']=false, 100); }
    else { keys['ArrowDown'] = true; setTimeout(()=>keys['ArrowDown']=false, 100); }
    touchStartY = e.touches[0].clientY;
  }
});

function startGame(){
  document.getElementById('start-screen').style.display = 'none';
  resetGame();
  loop();
}

/* ── Update ─────────────────────────────────────────── */
function update(dt){
  if(state !== 'racing') return;

  raceTime += dt;

  // Engine sound
  engineTimer -= dt;
  if(engineTimer <= 0 && player.speed > 1){
    sfx.engine();
    engineTimer = 0.12 - player.speed * 0.005;
  }

  // Crash recovery
  if(player.crashed){
    player.crashTimer -= dt;
    player.speed *= 0.95;
    if(player.crashTimer <= 0){
      player.crashed = false;
      player.speed = 1;
    }
    player.distance += player.speed;
    scrollX = player.distance - PLAYER_X;
    updateAI(dt);
    return;
  }

  // Overheat cooldown
  if(player.overheated){
    player.heat -= DIFF.coolRate * 2;
    player.speed *= 0.97;
    if(player.heat <= 0){
      player.heat = 0;
      player.overheated = false;
    }
    player.distance += player.speed;
    scrollX = player.distance - PLAYER_X;
    updateAI(dt);
    return;
  }

  // Acceleration
  const turbo = (keys['ShiftLeft'] || keys['ShiftRight']) && !player.overheated;
  const accel = keys['ArrowRight'];
  const brake = keys['ArrowLeft'];

  if(accel){
    const maxSpd = turbo ? DIFF.turboMax : DIFF.maxSpeed;
    const acc = turbo ? DIFF.turboAccel : DIFF.accel;
    player.speed = Math.min(player.speed + acc, maxSpd);
  } else {
    player.speed = Math.max(player.speed - 0.015, 0);
  }

  if(brake) player.speed = Math.max(player.speed - 0.08, 0);

  // Heat management
  if(turbo && accel){
    player.heat = Math.min(player.heat + DIFF.heatRate, 1);
    if(player.heat >= 1){
      player.overheated = true;
      sfx.overheat();
    }
    if(engineTimer <= 0) sfx.turbo();
  } else {
    player.heat = Math.max(player.heat - DIFF.coolRate, 0);
  }

  // Lane switching
  if(keys['ArrowUp'] && player.targetLane > 0 && player.jumpZ === 0){
    player.targetLane--;
    keys['ArrowUp'] = false;
  }
  if(keys['ArrowDown'] && player.targetLane < LANE_COUNT-1 && player.jumpZ === 0){
    player.targetLane++;
    keys['ArrowDown'] = false;
  }

  // Smooth lane transition
  const targetY = player.targetLane;
  if(player.lane < targetY) player.lane = Math.min(player.lane + 0.12, targetY);
  else if(player.lane > targetY) player.lane = Math.max(player.lane - 0.12, targetY);

  // Wheelie
  player.wheelie = keys['Space'] && player.jumpZ === 0;

  // Jump physics
  if(player.jumpZ > 0 || player.jumpVel !== 0){
    player.jumpZ += player.jumpVel;
    player.jumpVel -= GRAVITY;
    if(player.jumpZ <= 0){
      player.jumpZ = 0;
      // Landing quality
      if(player.jumpVel < -6){
        // Bad landing
        player.speed *= 0.4;
        sfx.crash();
        player.crashed = true;
        player.crashTimer = 1.2;
      } else {
        sfx.land();
        // Wheelie landing bonus
        if(player.wheelie) player.speed = Math.min(player.speed * 1.1, DIFF.turboMax);
      }
      player.jumpVel = 0;
    }
  }

  // Movement
  player.distance += player.speed;
  scrollX = player.distance - PLAYER_X;

  // Obstacle collision
  const pLane = Math.round(player.lane);
  for(const obs of obstacles){
    const relX = obs.x - scrollX;
    if(relX > PLAYER_X - 20 && relX < PLAYER_X + 30 && obs.lane === pLane && player.jumpZ < 8){
      switch(obs.type){
        case 'ramp_small':
          if(player.jumpZ === 0){
            player.jumpVel = 4 + player.speed * 0.3;
            player.jumpZ = 1;
            sfx.jump();
          }
          break;
        case 'ramp_big':
          if(player.jumpZ === 0){
            player.jumpVel = 6 + player.speed * 0.4;
            player.jumpZ = 1;
            sfx.jump();
          }
          break;
        case 'mud':
          if(player.jumpZ === 0) player.speed *= 0.96;
          break;
        case 'bump':
          if(player.jumpZ === 0 && !player.wheelie){
            player.speed *= 0.7;
            noise(0.1, 0.08);
          }
          break;
        case 'ai_rider':
          // Skip - handled differently
          break;
      }
    }
  }

  // AI collision
  for(const ai of aiRiders){
    const aiScreenX = ai.x - scrollX;
    if(Math.abs(aiScreenX - PLAYER_X) < 25 && Math.abs(ai.lane - player.lane) < 0.6 && player.jumpZ < 5 && ai.jumpZ < 5){
      player.crashed = true;
      player.crashTimer = 1.5;
      player.speed *= 0.3;
      sfx.crash();
    }
  }

  // Lap tracking
  if(player.distance >= TRACK_LENGTH * lap){
    if(lap >= DIFF.laps){
      state = 'finished';
      sfx.finish();
      endGame();
    } else {
      lap++;
      sfx.lapDone();
    }
  }

  updateAI(dt);
  updateHUD();
}

function updateAI(dt){
  for(const ai of aiRiders){
    ai.x += ai.speed;
    ai.laneTimer -= dt;
    if(ai.laneTimer <= 0){
      ai.targetLane = Math.floor(Math.random()*LANE_COUNT);
      ai.laneTimer = 1 + Math.random()*3;
    }
    if(ai.lane < ai.targetLane) ai.lane = Math.min(ai.lane + 0.05, ai.targetLane);
    else if(ai.lane > ai.targetLane) ai.lane = Math.max(ai.lane - 0.05, ai.targetLane);

    // AI jumps on ramps
    for(const obs of obstacles){
      if(obs.type.startsWith('ramp') && Math.abs(obs.x - ai.x) < 15 && obs.lane === Math.round(ai.lane) && ai.jumpZ === 0){
        ai.jumpVel = obs.type === 'ramp_big' ? 5 : 3;
        ai.jumpZ = 1;
      }
    }
    if(ai.jumpZ > 0){
      ai.jumpZ += ai.jumpVel;
      ai.jumpVel -= GRAVITY;
      if(ai.jumpZ <= 0){ ai.jumpZ = 0; ai.jumpVel = 0; }
    }

    // Wrap AI riders
    if(ai.x < scrollX - 200) ai.x = scrollX + W + Math.random()*400;
    if(ai.x > scrollX + W + 600) ai.x = scrollX - 100;
  }
}

function updateHUD(){
  document.getElementById('hud-time').textContent = raceTime.toFixed(1);
  document.getElementById('hud-speed').textContent = Math.floor(player.speed * 20) + ' km/h';
  document.getElementById('hud-lap').textContent = `${Math.min(lap, DIFF.laps)}/${DIFF.laps}`;

  // Heat meter
  const bars = 8;
  const filled = Math.round(player.heat * bars);
  let heatStr = '';
  for(let i = 0; i < bars; i++){
    heatStr += i < filled ? '▓' : '░';
  }
  const heatEl = document.getElementById('hud-heat');
  heatEl.textContent = heatStr;
  heatEl.style.color = player.overheated ? '#ef4444' : player.heat > 0.7 ? '#f97316' : '#22c55e';
}

/* ── Drawing ────────────────────────────────────────── */
function draw(){
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  drawSky();
  drawTrack();
  drawObstacles();
  drawAIRiders();
  drawPlayer();
  drawHeatBar();
  drawLapProgress();
}

function drawSky(){
  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, TRACK_TOP);
  grad.addColorStop(0, '#0f0f23');
  grad.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, TRACK_TOP);

  // Scrolling mountains
  ctx.fillStyle = '#16213e';
  for(let i = -1; i < 12; i++){
    const mx = i * 100 - (scrollX * 0.1) % 100;
    const mh = 20 + Math.sin(i*1.7)*15;
    ctx.beginPath();
    ctx.moveTo(mx, TRACK_TOP);
    ctx.lineTo(mx + 50, TRACK_TOP - mh);
    ctx.lineTo(mx + 100, TRACK_TOP);
    ctx.fill();
  }

  // Distant hills
  ctx.fillStyle = '#1a2744';
  for(let i = -1; i < 16; i++){
    const mx = i * 70 - (scrollX * 0.15) % 70;
    const mh = 10 + Math.cos(i*2.3)*8;
    ctx.beginPath();
    ctx.moveTo(mx, TRACK_TOP);
    ctx.lineTo(mx + 35, TRACK_TOP - mh);
    ctx.lineTo(mx + 70, TRACK_TOP);
    ctx.fill();
  }
}

function drawTrack(){
  // Track background
  const grad = ctx.createLinearGradient(0, TRACK_TOP, 0, TRACK_BOTTOM + 30);
  grad.addColorStop(0, '#8B7355');
  grad.addColorStop(0.5, '#7A6448');
  grad.addColorStop(1, '#6B563B');
  ctx.fillStyle = grad;
  ctx.fillRect(0, TRACK_TOP, W, TRACK_BOTTOM - TRACK_TOP + 30);

  // Lane lines
  ctx.strokeStyle = '#5C4A30';
  ctx.lineWidth = 1;
  ctx.setLineDash([12, 8]);
  for(let i = 1; i < LANE_COUNT; i++){
    const y = TRACK_TOP + i * LANE_H;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Track borders
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, TRACK_TOP);
  ctx.lineTo(W, TRACK_TOP);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, TRACK_BOTTOM);
  ctx.lineTo(W, TRACK_BOTTOM);
  ctx.stroke();

  // Scrolling track markers
  ctx.fillStyle = '#5C4A30';
  const markerSpacing = 80;
  const markerOffset = scrollX % markerSpacing;
  for(let x = -markerOffset; x < W + markerSpacing; x += markerSpacing){
    ctx.fillRect(x, TRACK_TOP - 8, 4, 8);
    ctx.fillRect(x, TRACK_BOTTOM, 4, 8);
  }

  // Finish line markers at track end
  for(let l = 0; l < DIFF.laps; l++){
    const finishX = TRACK_LENGTH * (l+1) - scrollX;
    if(finishX > -20 && finishX < W + 20){
      ctx.fillStyle = '#fff';
      for(let row = 0; row < 12; row++){
        for(let col = 0; col < 3; col++){
          if((row+col) % 2 === 0){
            ctx.fillRect(finishX + col*8, TRACK_TOP + row * ((TRACK_BOTTOM-TRACK_TOP)/12), 8, (TRACK_BOTTOM-TRACK_TOP)/12);
          }
        }
      }
    }
  }

  // Ground below track
  ctx.fillStyle = '#4a3728';
  ctx.fillRect(0, TRACK_BOTTOM + 30, W, H - TRACK_BOTTOM - 30);
}

function laneY(lane){
  return TRACK_TOP + lane * LANE_H + LANE_H / 2;
}

function drawObstacles(){
  for(const obs of obstacles){
    const sx = obs.x - scrollX;
    if(sx < -50 || sx > W + 50) continue;
    const sy = laneY(obs.lane);

    switch(obs.type){
      case 'ramp_small':
        ctx.fillStyle = '#d4a574';
        ctx.beginPath();
        ctx.moveTo(sx, sy + 8);
        ctx.lineTo(sx + 20, sy - 8);
        ctx.lineTo(sx + 24, sy + 8);
        ctx.fill();
        ctx.fillStyle = '#c4956a';
        ctx.fillRect(sx, sy + 8, 24, 3);
        break;
      case 'ramp_big':
        ctx.fillStyle = '#e8b88a';
        ctx.beginPath();
        ctx.moveTo(sx, sy + 10);
        ctx.lineTo(sx + 10, sy - 18);
        ctx.lineTo(sx + 32, sy - 18);
        ctx.lineTo(sx + 36, sy + 10);
        ctx.fill();
        ctx.fillStyle = '#d4a070';
        ctx.fillRect(sx, sy + 10, 36, 3);
        // Stripe
        ctx.fillStyle = '#f97316';
        ctx.fillRect(sx + 8, sy - 16, 18, 2);
        break;
      case 'mud':
        ctx.fillStyle = '#5a3a1a';
        ctx.fillRect(sx, sy + 2, 40, 12);
        // Mud texture dots
        ctx.fillStyle = '#4a2a0a';
        for(let i = 0; i < 5; i++){
          ctx.fillRect(sx + 4 + i*8, sy + 5 + (i%2)*3, 3, 3);
        }
        break;
      case 'bump':
        ctx.fillStyle = '#888';
        ctx.fillRect(sx, sy + 4, 18, 6);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(sx + 2, sy + 2, 14, 4);
        break;
    }
  }
}

function drawBike(x, y, jumpZ, color, crashed, wheelie, speed){
  const bikeY = y - jumpZ;

  ctx.save();
  ctx.translate(x, bikeY);

  if(crashed){
    ctx.rotate(Math.sin(Date.now()*0.02) * 0.5);
  } else if(wheelie){
    ctx.rotate(-0.25);
  }

  // Shadow
  if(jumpZ > 2){
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-10, jumpZ + 4, 28, 4);
  }

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-8, 6, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(12, 6, 6, 0, Math.PI*2);
  ctx.fill();

  // Wheel spokes / rims
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.arc(-8, 6, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(12, 6, 3, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(-6, -2, 20, 6);

  // Engine block
  ctx.fillStyle = '#444';
  ctx.fillRect(-2, 2, 8, 5);

  // Handlebars
  ctx.fillStyle = '#888';
  ctx.fillRect(10, -6, 3, 6);

  // Seat
  ctx.fillStyle = '#333';
  ctx.fillRect(-4, -5, 10, 3);

  // Rider
  ctx.fillStyle = color;
  ctx.fillRect(-2, -14, 6, 9); // torso
  ctx.fillStyle = '#ffd5a0';
  ctx.fillRect(0, -17, 4, 4); // head

  // Helmet
  ctx.fillStyle = color;
  ctx.fillRect(-1, -18, 6, 3);

  // Speed exhaust
  if(speed > 4 && !crashed){
    ctx.fillStyle = `rgba(255,165,0,${0.3 + Math.random()*0.3})`;
    ctx.fillRect(-14 - Math.random()*8, 1, 6 + Math.random()*4, 3);
    ctx.fillStyle = `rgba(255,100,0,${0.2 + Math.random()*0.2})`;
    ctx.fillRect(-18 - Math.random()*6, 2, 4, 2);
  }

  ctx.restore();
}

function drawPlayer(){
  const y = laneY(player.lane);
  const color = player.overheated ? '#ef4444' : player.crashed ? '#666' : '#f97316';
  drawBike(PLAYER_X, y, player.jumpZ, color, player.crashed, player.wheelie, player.speed);

  // Crash indicator
  if(player.crashed){
    ctx.fillStyle = '#ef4444';
    ctx.font = '10px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('CRASH!', PLAYER_X, laneY(player.lane) - player.jumpZ - 30);
  }

  // Overheat indicator
  if(player.overheated){
    ctx.fillStyle = '#ef4444';
    ctx.font = '8px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('OVERHEAT!', PLAYER_X, laneY(player.lane) - 30);
    // Steam particles
    for(let i = 0; i < 3; i++){
      ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.random()*0.3})`;
      ctx.fillRect(PLAYER_X - 5 + Math.random()*20, laneY(player.lane) - 20 - Math.random()*15, 2, 2);
    }
  }
}

function drawAIRiders(){
  for(const ai of aiRiders){
    const sx = ai.x - scrollX;
    if(sx < -30 || sx > W + 30) continue;
    drawBike(sx, laneY(ai.lane), ai.jumpZ, ai.color, false, false, ai.speed);
  }
}

function drawHeatBar(){
  // Heat meter bar (bottom-left)
  const barX = 20, barY = H - 35, barW = 120, barH = 10;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);

  const heatW = player.heat * barW;
  const heatColor = player.overheated ? '#ef4444' : player.heat > 0.7 ? '#f97316' : '#22c55e';
  ctx.fillStyle = heatColor;
  ctx.fillRect(barX, barY, heatW, barH);

  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = '#aaa';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('HEAT', barX, barY - 4);
}

function drawLapProgress(){
  // Lap progress bar (bottom)
  const barX = 200, barY = H - 35, barW = 400, barH = 8;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);

  const totalDist = TRACK_LENGTH * DIFF.laps;
  const progress = Math.min(player.distance / totalDist, 1);
  ctx.fillStyle = '#f97316';
  ctx.fillRect(barX, barY, progress * barW, barH);

  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // Lap markers
  for(let i = 1; i <= DIFF.laps; i++){
    const mx = barX + (i / DIFF.laps) * barW;
    ctx.fillStyle = '#fff';
    ctx.fillRect(mx - 1, barY - 2, 2, barH + 4);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('PROGRESS', barX, barY - 4);

  // Speed bar (bottom-right)
  const sBarX = 650, sBarW = 120;
  ctx.fillStyle = '#333';
  ctx.fillRect(sBarX, barY, sBarW, barH);

  const speedPct = player.speed / DIFF.turboMax;
  ctx.fillStyle = player.speed > DIFF.maxSpeed ? '#f97316' : '#3b82f6';
  ctx.fillRect(sBarX, barY, speedPct * sBarW, barH);

  ctx.strokeStyle = '#555';
  ctx.strokeRect(sBarX, barY, sBarW, barH);

  ctx.fillStyle = '#aaa';
  ctx.fillText('SPEED', sBarX, barY - 4);
}

/* ── End Game ───────────────────────────────────────── */
function endGame(){
  // Score based on time (lower is better, but we invert for leaderboard)
  const timeScore = Math.max(0, Math.floor((300 - raceTime) * 100));
  const finalScore = Math.floor(timeScore * DIFF.scoreMultiplier);

  const best = bestScore;
  if(finalScore > bestScore){
    bestScore = finalScore;
    localStorage.setItem('excitebike_best', bestScore);
  }

  const rank = saveScore('excitebike', finalScore, diffKey);
  if(rank > 0){
    showHighScoreBanner(rank);
    setTimeout(() => playHighScoreChime(muted), 700);
  }

  document.getElementById('overlay-score').textContent = `TIME  ${raceTime.toFixed(2)}s  —  SCORE  ${finalScore}`;
  document.getElementById('overlay-best').textContent = `BEST  ${Math.max(bestScore, finalScore)}`;
  document.getElementById('overlay').classList.add('show');
}

/* ── Game Loop ──────────────────────────────────────── */
let lastTime = 0;
function loop(timestamp = 0){
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  draw();

  if(state !== 'finished') rafId = requestAnimationFrame(loop);
}

document.getElementById('newGameBtn').addEventListener('click', () => {
  resetGame();
  lastTime = performance.now();
  loop(lastTime);
});

</script>
