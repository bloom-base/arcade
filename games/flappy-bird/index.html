<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY BIRD — arcade</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            user-select: none;
        }

        /* CRT scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0, transparent 3px,
                rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* ── Fixed buttons ───────────────────────────────────── */
        .back-btn {
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            color: #444;
            background: transparent;
            border: 1px solid #2a2a2a;
            padding: 0.5rem 0.875rem;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: color 0.15s, border-color 0.15s;
            z-index: 50;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover { color: #fafafa; border-color: #555; }

        .mute-btn {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            color: #444;
            background: transparent;
            border: 1px solid #2a2a2a;
            padding: 0.5rem 0.875rem;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: color 0.15s, border-color 0.15s;
            z-index: 50;
        }
        .mute-btn:hover { color: #fafafa; border-color: #555; }
        .mute-btn.muted { color: #ef4444; border-color: #7f1d1d; }

        /* ── Game wrapper ─────────────────────────────────────── */
        #game-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        #title {
            font-size: clamp(0.55rem, 2.5vw, 0.85rem);
            letter-spacing: 0.25em;
            color: #facc15;
            text-shadow: 0 0 24px rgba(250,204,21,0.6);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            cursor: pointer;
        }

        /* ── Controls hint ────────────────────────────────────── */
        #controls-hint {
            font-size: clamp(0.28rem, 1vw, 0.38rem);
            color: #383838;
            letter-spacing: 0.08em;
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .hint-key {
            display: inline-block;
            border: 1px solid #2a2a2a;
            padding: 0.15rem 0.35rem;
            font-size: inherit;
            color: #505050;
        }

        /* ── Game Over overlay ────────────────────────────────── */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 0.6rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #overlay.show { opacity: 1; pointer-events: auto; }

        #overlay-title {
            font-size: clamp(0.85rem, 3.5vw, 1.3rem);
            letter-spacing: 0.12em;
            color: #facc15;
            text-shadow: 0 0 30px rgba(250,204,21,0.7);
            margin-bottom: 0.25rem;
        }
        #overlay-score {
            font-size: clamp(0.38rem, 1.4vw, 0.52rem);
            color: #a3a3a3;
            letter-spacing: 0.12em;
        }
        #overlay-best {
            font-size: clamp(0.38rem, 1.4vw, 0.52rem);
            color: #525252;
            letter-spacing: 0.12em;
            margin-bottom: 0.5rem;
        }

        .menu-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.38rem, 1.4vw, 0.52rem);
            padding: 0.7rem 1.6rem;
            cursor: pointer;
            letter-spacing: 0.08em;
            transition: all 0.15s;
            display: inline-block;
        }
        .menu-btn.primary {
            background: #facc15;
            color: #0a0a0a;
            border: none;
        }
        .menu-btn.primary:hover {
            background: #fde047;
            transform: translateY(-1px);
        }
        .menu-btn.secondary {
            background: transparent;
            color: #737373;
            border: 1px solid #333;
            text-decoration: none;
        }
        .menu-btn.secondary:hover { color: #fafafa; border-color: #555; }
    </style>
</head>
<body>

<a class="back-btn" href="../../index.html#games">← BACK</a>
<button class="mute-btn" id="muteBtn">♪ SFX</button>

<div id="game-wrap">
    <div id="title">FLAPPY BIRD</div>
    <canvas id="canvas"></canvas>
    <div id="controls-hint">
        <span class="hint-key">SPACE</span>
        <span>or</span>
        <span class="hint-key">CLICK</span>
        <span>to flap</span>
    </div>
</div>

<div id="overlay">
    <div id="overlay-title">GAME OVER</div>
    <div id="overlay-score" id="overlay-score"></div>
    <div id="overlay-best"></div>
    <button class="menu-btn primary" id="newGameBtn">PLAY AGAIN</button>
    <a class="menu-btn secondary" href="../../index.html#games">← ARCADE</a>
</div>

<script type="module">
import { getDifficulty } from '../../utils/difficulty.js';
import { saveScore, playHighScoreChime, showHighScoreBanner } from '../../utils/scores.js';

// ── Audio ──────────────────────────────────────────────────────
let muted = false;
let audioCtx = null;

function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function tone(freq, type, dur, vol = 0.2, delay = 0) {
    if (muted) return;
    try {
        const ctx = getAudio();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
        gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + dur);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + dur + 0.01);
    } catch (_) {}
}

const sfx = {
    flap    : () => tone(540, 'square',   0.06,  0.14),
    score   : () => { tone(660, 'square', 0.07, 0.16); tone(880, 'square', 0.07, 0.13, 0.07); },
    hit     : () => { tone(200, 'sawtooth', 0.10, 0.22); tone(140, 'sawtooth', 0.14, 0.18, 0.09); },
    gameOver: () => {
        [200, 160, 120].forEach((f, i) => tone(f, 'sawtooth', 0.16, 0.20, i * 0.14));
    },
};

document.getElementById('muteBtn').addEventListener('click', () => {
    muted = !muted;
    const btn = document.getElementById('muteBtn');
    btn.textContent = muted ? '✕ SFX' : '♪ SFX';
    btn.classList.toggle('muted', muted);
});

// ── Difficulty ──────────────────────────────────────────────────
const urlDiff = new URLSearchParams(location.search).get('difficulty')
             || new URLSearchParams(location.search).get('d');
const storedDiff = getDifficulty();
const diffKey = ['easy','normal','hard'].includes(urlDiff) ? urlDiff : storedDiff;

const DIFF = {
    easy:   { speed: 2.4, gap: 155, gravity: 0.36, flap: -8.2, interval: 115, scoreMultiplier: 1   },
    normal: { speed: 3.0, gap: 128, gravity: 0.44, flap: -8.8, interval: 95,  scoreMultiplier: 1.5 },
    hard:   { speed: 4.0, gap: 106, gravity: 0.54, flap: -9.4, interval: 78,  scoreMultiplier: 2   },
}[diffKey];

// ── Canvas setup ───────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const CW = 360, CH = 520;
canvas.width  = CW;
canvas.height = CH;

function resize() {
    const maxW = window.innerWidth  - 32;
    const maxH = window.innerHeight - 130;
    const s = Math.min(maxW / CW, maxH / CH, 1.4);
    canvas.style.width  = (CW * s) + 'px';
    canvas.style.height = (CH * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Game constants ─────────────────────────────────────────────
const BIRD_X   = 88;
const BIRD_R   = 13;
const PIPE_W   = 52;
const PIPE_CAP = 9;
const GROUND_H = 50;
const PIPE_COL  = '#4ade80';
const PIPE_DARK = '#166534';
const GROUND_COL = '#292524';
const GROUND_LINE = '#3c3734';
const BIRD_COL  = '#facc15';
const BIRD_WING = '#ca8a04';
const BIRD_BEAK = '#f97316';

// ── State ──────────────────────────────────────────────────────
let bird, pipes, score, frameCount, gameState, particles, groundOffset;

function resetState() {
    bird = { y: CH / 2 - 30, vy: 0, rotation: 0 };
    pipes        = [];
    score        = 0;
    frameCount   = 0;
    gameState    = 'idle';   // 'idle' | 'playing' | 'dead'
    particles    = [];
    groundOffset = 0;
}

resetState();

// ── Input ──────────────────────────────────────────────────────
function flap() {
    if (gameState === 'dead') return;
    if (gameState === 'idle') gameState = 'playing';
    bird.vy = DIFF.flap;
    sfx.flap();
}

window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        flap();
    }
});
canvas.addEventListener('click', flap);
document.addEventListener('touchstart', e => {
    // Only flap if touch was on the canvas or game area
    if (e.target === canvas || e.target.closest('#game-wrap')) {
        e.preventDefault();
        flap();
    }
}, { passive: false });

// ── Pipe generation ─────────────────────────────────────────────
function spawnPipe() {
    const minY = 55;
    const maxY = CH - GROUND_H - DIFF.gap - 55;
    const gapTop = Math.random() * (maxY - minY) + minY;
    pipes.push({ x: CW + PIPE_W, gapTop, scored: false });
}

// ── Particles ──────────────────────────────────────────────────
function spawnParticles(x, y) {
    for (let i = 0; i < 16; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd   = Math.random() * 4 + 1.2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 1,
            life: 1,
            decay: Math.random() * 0.035 + 0.025,
            r: Math.random() * 4 + 2,
            color: [BIRD_COL, '#fde047', BIRD_BEAK][Math.floor(Math.random() * 3)],
        });
    }
}

// ── Collision ──────────────────────────────────────────────────
function checkCollision() {
    const hitR = BIRD_R - 3;  // slightly forgiving hitbox

    // Ground or ceiling
    if (bird.y + hitR >= CH - GROUND_H) return true;
    if (bird.y - hitR <= 0) return true;

    // Pipes
    for (const p of pipes) {
        if (BIRD_X + hitR > p.x && BIRD_X - hitR < p.x + PIPE_W) {
            if (bird.y - hitR < p.gapTop || bird.y + hitR > p.gapTop + DIFF.gap) {
                return true;
            }
        }
    }
    return false;
}

// ── Update ────────────────────────────────────────────────────
function update() {
    if (gameState === 'dead') {
        for (const p of particles) {
            p.x  += p.vx;
            p.y  += p.vy;
            p.vy += 0.18;
            p.life -= p.decay;
        }
        particles = particles.filter(p => p.life > 0);
        return;
    }

    if (gameState === 'idle') {
        // Gentle bobbing
        bird.y = CH / 2 - 30 + Math.sin(frameCount * 0.07) * 9;
        frameCount++;
        return;
    }

    // ── Playing ──
    frameCount++;

    // Bird physics
    bird.vy += DIFF.gravity;
    bird.vy  = Math.min(bird.vy, 11);  // terminal velocity cap
    bird.y  += bird.vy;

    // Bird rotation: nose-down when falling, nose-up when rising
    const targetRot = Math.max(-28, Math.min(85, bird.vy * 5.5));
    bird.rotation += (targetRot - bird.rotation) * 0.22;

    // Ground scroll
    groundOffset = (groundOffset + DIFF.speed) % 32;

    // Spawn pipes (first at frame 80, then every DIFF.interval frames)
    const FIRST_PIPE = 80;
    if (frameCount === FIRST_PIPE ||
        (frameCount > FIRST_PIPE && (frameCount - FIRST_PIPE) % DIFF.interval === 0)) {
        spawnPipe();
    }

    // Move pipes & check scoring
    for (const p of pipes) {
        p.x -= DIFF.speed;
        if (!p.scored && p.x + PIPE_W < BIRD_X) {
            p.scored = true;
            score++;
            sfx.score();
        }
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // Collision check
    if (checkCollision()) {
        gameState = 'dead';
        sfx.hit();
        spawnParticles(BIRD_X, bird.y);
        // Clamp bird to ground
        bird.y = Math.min(bird.y, CH - GROUND_H - BIRD_R);
        setTimeout(() => {
            sfx.gameOver();
            endGame();
        }, 520);
    }
}

// ── Draw ───────────────────────────────────────────────────────
function drawBird(x, y, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation * Math.PI / 180);

    // Body glow + fill
    ctx.shadowBlur  = 20;
    ctx.shadowColor = BIRD_COL;
    ctx.fillStyle   = BIRD_COL;
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Wing (slightly darker, offset down-left)
    ctx.fillStyle = BIRD_WING;
    ctx.beginPath();
    ctx.ellipse(-2, 4, 7, 4.5, -0.25, 0, Math.PI * 2);
    ctx.fill();

    // Eye white
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(5, -3, 4, 0, Math.PI * 2);
    ctx.fill();

    // Eye pupil
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.arc(6, -3, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Eye shine
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(7, -4, 1, 0, Math.PI * 2);
    ctx.fill();

    // Beak (triangle)
    ctx.fillStyle = BIRD_BEAK;
    ctx.beginPath();
    ctx.moveTo(BIRD_R, -2);
    ctx.lineTo(BIRD_R + 8, 1);
    ctx.lineTo(BIRD_R, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawPipe(x, gapTop) {
    const gapBot = gapTop + DIFF.gap;
    const capX   = x - 4;
    const capW   = PIPE_W + 8;

    // ── Top pipe ──────────────────────────
    // Body
    ctx.fillStyle   = PIPE_COL;
    ctx.shadowBlur  = 10;
    ctx.shadowColor = PIPE_COL;
    ctx.fillRect(x, 0, PIPE_W, gapTop - PIPE_CAP);
    ctx.shadowBlur = 0;

    // Cap
    ctx.fillStyle = PIPE_COL;
    ctx.fillRect(capX, gapTop - PIPE_CAP, capW, PIPE_CAP);

    // Dark left edge (shading)
    ctx.fillStyle = PIPE_DARK;
    ctx.fillRect(x, 0, 4, gapTop - PIPE_CAP);
    ctx.fillRect(capX, gapTop - PIPE_CAP, 4, PIPE_CAP);

    // ── Bottom pipe ───────────────────────
    const botBodyTop = gapBot + PIPE_CAP;
    const botBodyH   = CH - GROUND_H - botBodyTop;

    // Body
    ctx.fillStyle   = PIPE_COL;
    ctx.shadowBlur  = 10;
    ctx.shadowColor = PIPE_COL;
    ctx.fillRect(x, botBodyTop, PIPE_W, botBodyH);
    ctx.shadowBlur = 0;

    // Cap
    ctx.fillStyle = PIPE_COL;
    ctx.fillRect(capX, gapBot, capW, PIPE_CAP);

    // Dark left edge
    ctx.fillStyle = PIPE_DARK;
    ctx.fillRect(x, botBodyTop, 4, botBodyH);
    ctx.fillRect(capX, gapBot, 4, PIPE_CAP);
}

function drawGround() {
    // Main ground bar
    ctx.fillStyle = GROUND_COL;
    ctx.fillRect(0, CH - GROUND_H, CW, GROUND_H);

    // Scrolling stripe pattern
    ctx.fillStyle = GROUND_LINE;
    const sw = 32;
    for (let x = ((-groundOffset) % sw + sw) % sw - sw; x < CW; x += sw) {
        ctx.fillRect(x, CH - GROUND_H, sw / 2, 8);
    }

    // Top divider line
    ctx.fillStyle = '#444';
    ctx.fillRect(0, CH - GROUND_H, CW, 2);
}

function draw() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, CH - GROUND_H);
    sky.addColorStop(0, '#060612');
    sky.addColorStop(1, '#0c1830');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, CW, CH);

    // Static stars
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    const stars = [
        [28,18],[75,42],[138,12],[195,58],[258,27],[318,48],
        [48,78],[168,88],[308,72],[98,108],[236,98],[52,130],
        [180,140],[320,115],[12,155],[155,50],[288,160],
    ];
    for (const [sx, sy] of stars) {
        ctx.fillRect(sx, sy, 2, 2);
    }

    // Pipes (behind bird)
    for (const p of pipes) drawPipe(p.x, p.gapTop);

    // Ground
    drawGround();

    // Particles
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle   = p.color;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // Bird
    if (gameState !== 'dead') {
        drawBird(BIRD_X, bird.y, bird.rotation);
    } else if (particles.length > 0) {
        // Bird still briefly visible as it hits
    } else {
        // Show crumpled bird after particles clear
        drawBird(BIRD_X, Math.min(bird.y, CH - GROUND_H - BIRD_R), 90);
    }

    // Score display
    if (gameState === 'playing' || gameState === 'dead') {
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'top';
        ctx.font = '28px "Press Start 2P", monospace';
        ctx.fillStyle   = '#ffffff';
        ctx.shadowBlur  = 18;
        ctx.shadowColor = 'rgba(255,255,255,0.45)';
        ctx.fillText(score, CW / 2, 14);
        ctx.shadowBlur = 0;
    }

    // Idle "press to start" prompt
    if (gameState === 'idle') {
        const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.08);
        ctx.globalAlpha = pulse;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '9px "Press Start 2P", monospace';
        ctx.fillStyle   = BIRD_COL;
        ctx.shadowBlur  = 14;
        ctx.shadowColor = BIRD_COL;
        ctx.fillText('PRESS SPACE TO START', CW / 2, CH / 2 + 72);
        ctx.shadowBlur  = 0;
        ctx.globalAlpha = 1;
        drawBird(BIRD_X, bird.y, 0);
    }

    // Difficulty badge
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillStyle    = '#252525';
    ctx.fillText(diffKey.toUpperCase(), CW / 2, CH - 4);
}

// ── Game over / scoring ────────────────────────────────────────
function getBestScore() {
    try {
        const key   = `flappy_best_${diffKey}`;
        const cur   = parseInt(localStorage.getItem(key) || '0', 10);
        const final = Math.floor(score * DIFF.scoreMultiplier);
        const best  = Math.max(cur, final);
        localStorage.setItem(key, best);
        return best;
    } catch (_) { return Math.floor(score * DIFF.scoreMultiplier); }
}

function endGame() {
    const finalScore = Math.floor(score * DIFF.scoreMultiplier);
    const best       = getBestScore();

    const rank = saveScore('flappy-bird', finalScore, diffKey);
    if (rank > 0) {
        showHighScoreBanner(rank);
        setTimeout(() => playHighScoreChime(muted), 700);
    }

    document.getElementById('overlay-score').textContent = `SCORE  ${finalScore}`;
    document.getElementById('overlay-best').textContent  = `BEST   ${best}`;
    document.getElementById('overlay').classList.add('show');
}

document.getElementById('newGameBtn').addEventListener('click', startGame);

// ── Main loop ──────────────────────────────────────────────────
let rafId = null;

function loop() {
    update();
    draw();
    rafId = requestAnimationFrame(loop);
}

function startGame() {
    document.getElementById('overlay').classList.remove('show');
    resetState();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
}

startGame();
</script>
</body>
</html>
