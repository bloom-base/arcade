<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIMON — arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Press Start 2P', monospace;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 900;
    }

    /* ── Nav buttons ───────────────────────────── */
    .back-btn {
      position: fixed;
      top: 1rem; left: 1rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #666;
      text-decoration: none;
      border: 1px solid #333;
      padding: 0.4rem 0.7rem;
      background: #111;
      z-index: 50;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: #fff; border-color: #666; }

    .mute-btn {
      position: fixed;
      top: 1rem; right: 1rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #666;
      background: #111;
      border: 1px solid #333;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      z-index: 50;
      transition: color 0.2s, border-color 0.2s;
    }
    .mute-btn:hover { color: #fff; border-color: #666; }
    .mute-btn.muted  { color: #444; border-color: #222; }

    /* ── Layout ────────────────────────────────── */
    #game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      padding: 1rem;
      width: 100%;
      max-width: 420px;
    }

    /* ── Title ─────────────────────────────────── */
    #title {
      font-size: 2.2rem;
      color: #fff;
      text-shadow:
        0 0 18px rgba(255,255,255,0.45),
        0 0 40px rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }

    /* ── LCD Score Display ─────────────────────── */
    #score-area {
      display: flex;
      gap: 2.5rem;
    }

    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .score-label {
      font-size: 0.42rem;
      color: #555;
      letter-spacing: 0.12em;
    }

    .score-val {
      font-size: 1.5rem;
      min-width: 3ch;
      text-align: center;
      background: #081408;
      border: 2px solid #1a3a1a;
      padding: 0.25rem 0.65rem;
      color: #22ff44;
      text-shadow: 0 0 10px rgba(34,255,68,0.8), 0 0 20px rgba(34,255,68,0.4);
      border-radius: 3px;
    }

    /* ── Status text ───────────────────────────── */
    #status-text {
      font-size: 0.58rem;
      color: #666;
      min-height: 1.4em;
      text-align: center;
      letter-spacing: 0.05em;
      transition: color 0.25s, text-shadow 0.25s;
    }
    #status-text.watching {
      color: #ffdd44;
      text-shadow: 0 0 12px rgba(255,221,68,0.6);
    }
    #status-text.your-turn {
      color: #22ff44;
      text-shadow: 0 0 12px rgba(34,255,68,0.6);
    }
    #status-text.correct {
      color: #88ddff;
      text-shadow: 0 0 12px rgba(136,221,255,0.6);
    }
    #status-text.gameover {
      color: #ef4444;
      text-shadow: 0 0 12px rgba(239,68,68,0.6);
    }

    /* ── Simon Board ───────────────────────────── */
    #simon-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
    }

    .simon-btn {
      width: 155px;
      height: 155px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      outline: none;
      transition: transform 0.08s ease, filter 0.08s ease, box-shadow 0.08s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .simon-btn::after {
      content: '';
      position: absolute;
      inset: 12px 12px auto auto;
      width: 28px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: rotate(-35deg);
      pointer-events: none;
    }

    .simon-btn:disabled { cursor: not-allowed; }
    .simon-btn:not(:disabled):active { transform: scale(0.94); }

    /* Red */
    #btn-0 {
      background: radial-gradient(ellipse at 35% 35%, #f06050, #b01800);
      box-shadow: 0 5px 18px rgba(176,24,0,0.45), inset 0 2px 0 rgba(255,110,90,0.25);
    }
    #btn-0.lit {
      background: radial-gradient(ellipse at 35% 35%, #ffaa99, #ff5533);
      box-shadow:
        0 0 48px rgba(255,85,51,0.95),
        0 0 90px rgba(255,85,51,0.5),
        inset 0 2px 0 rgba(255,200,180,0.4);
      filter: brightness(1.35);
    }

    /* Blue */
    #btn-1 {
      background: radial-gradient(ellipse at 35% 35%, #4466ee, #002299);
      box-shadow: 0 5px 18px rgba(0,34,153,0.45), inset 0 2px 0 rgba(100,140,255,0.25);
    }
    #btn-1.lit {
      background: radial-gradient(ellipse at 35% 35%, #99bbff, #3366ff);
      box-shadow:
        0 0 48px rgba(51,102,255,0.95),
        0 0 90px rgba(51,102,255,0.5),
        inset 0 2px 0 rgba(180,200,255,0.4);
      filter: brightness(1.35);
    }

    /* Green */
    #btn-2 {
      background: radial-gradient(ellipse at 35% 35%, #33bb44, #006600);
      box-shadow: 0 5px 18px rgba(0,102,0,0.45), inset 0 2px 0 rgba(80,220,100,0.25);
    }
    #btn-2.lit {
      background: radial-gradient(ellipse at 35% 35%, #99ffaa, #22ee44);
      box-shadow:
        0 0 48px rgba(34,238,68,0.95),
        0 0 90px rgba(34,238,68,0.5),
        inset 0 2px 0 rgba(180,255,190,0.4);
      filter: brightness(1.35);
    }

    /* Yellow */
    #btn-3 {
      background: radial-gradient(ellipse at 35% 35%, #ddaa22, #aa7700);
      box-shadow: 0 5px 18px rgba(170,119,0,0.45), inset 0 2px 0 rgba(255,220,80,0.25);
    }
    #btn-3.lit {
      background: radial-gradient(ellipse at 35% 35%, #ffee99, #ffdd00);
      box-shadow:
        0 0 48px rgba(255,221,0,0.95),
        0 0 90px rgba(255,221,0,0.5),
        inset 0 2px 0 rgba(255,240,180,0.4);
      filter: brightness(1.35);
    }

    /* Wrong flash — all buttons together */
    .simon-btn.wrong {
      animation: wrongFlash 0.45s ease-out forwards;
    }
    @keyframes wrongFlash {
      0%   { filter: brightness(1); }
      30%  { filter: brightness(2.8) saturate(0); }
      60%  { filter: brightness(1); }
      80%  { filter: brightness(2.2) saturate(0); }
      100% { filter: brightness(1); }
    }

    /* ── Start / Restart ───────────────────────── */
    #controls { display: flex; gap: 0.8rem; }

    .ctrl-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      background: #111;
      color: #888;
      border: 2px solid #333;
      padding: 0.65rem 1.3rem;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s, background 0.18s;
      text-decoration: none;
      display: inline-block;
    }
    .ctrl-btn:hover { color: #ccc; border-color: #888; }
    .ctrl-btn.primary {
      color: #22ff44;
      border-color: #22ff44;
      box-shadow: 0 0 12px rgba(34,255,68,0.3);
    }
    .ctrl-btn.primary:hover {
      background: rgba(34,255,68,0.08);
      box-shadow: 0 0 22px rgba(34,255,68,0.5);
    }

    /* ── Game-over Overlay ─────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.87);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #overlay-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      padding: 2.4rem 2.8rem;
      border: 2px solid #ef4444;
      background: #0a0a0a;
      box-shadow: 0 0 50px rgba(239,68,68,0.35), 0 0 100px rgba(239,68,68,0.15);
      text-align: center;
      max-width: 340px;
      width: 90vw;
    }

    #overlay-title {
      font-size: 1.5rem;
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239,68,68,0.7);
    }

    #overlay-round {
      font-size: 0.62rem;
      color: #999;
      line-height: 1.8;
    }
    #overlay-round .big {
      display: block;
      font-size: 1.2rem;
      color: #fff;
      margin-top: 0.3rem;
    }

    #overlay-best {
      font-size: 0.5rem;
      color: #22ff44;
      text-shadow: 0 0 8px rgba(34,255,68,0.5);
      min-height: 1em;
    }

    #overlay-actions {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      width: 100%;
      align-items: center;
    }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 420px) {
      #title { font-size: 1.6rem; }
      .simon-btn { width: 130px; height: 130px; }
      #simon-board { gap: 0.65rem; }
      .score-val { font-size: 1.2rem; }
    }
    @media (max-width: 340px) {
      .simon-btn { width: 112px; height: 112px; }
      #simon-board { gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <a class="back-btn" href="../../index.html#games">← BACK</a>
  <button class="mute-btn" id="muteBtn">♪ SFX</button>

  <div id="game-wrap">
    <div id="title">SIMON</div>

    <div id="score-area">
      <div class="score-box">
        <div class="score-label">ROUND</div>
        <div class="score-val" id="roundDisplay">—</div>
      </div>
      <div class="score-box">
        <div class="score-label">BEST</div>
        <div class="score-val" id="bestDisplay">0</div>
      </div>
    </div>

    <div id="status-text">Press START to play</div>

    <div id="simon-board">
      <button class="simon-btn" id="btn-0" data-idx="0" disabled aria-label="Red"></button>
      <button class="simon-btn" id="btn-1" data-idx="1" disabled aria-label="Blue"></button>
      <button class="simon-btn" id="btn-2" data-idx="2" disabled aria-label="Green"></button>
      <button class="simon-btn" id="btn-3" data-idx="3" disabled aria-label="Yellow"></button>
    </div>

    <div id="controls">
      <button class="ctrl-btn primary" id="startBtn">START</button>
    </div>
  </div>

  <!-- Game-over overlay -->
  <div id="overlay">
    <div id="overlay-box">
      <div id="overlay-title">GAME OVER</div>
      <div id="overlay-round">
        You reached round
        <span class="big" id="finalRound">0</span>
      </div>
      <div id="overlay-best"></div>
      <div id="overlay-actions">
        <button class="ctrl-btn primary" id="playAgainBtn">PLAY AGAIN</button>
        <a class="ctrl-btn" href="../../index.html#games">← MAIN MENU</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { getDifficulty } from '../../utils/difficulty.js';
    import { saveScore, playHighScoreChime, showHighScoreBanner } from '../../utils/scores.js';

    /* ── Audio ─────────────────────────────────────────────────────────── */
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function tone(freq, type = 'sine', vol = 0.38, dur = 0.32, delay = 0) {
      if (muted) return;
      const ctx = getAudio();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.value = freq;
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }

    // Classic Simon frequencies: red=low, yellow=high
    const BTN_FREQ = [252, 311, 209, 415]; // red, blue, green, yellow

    const sfx = {
      button: (idx) => tone(BTN_FREQ[idx], 'sine', 0.42, 0.38),
      wrong: () => {
        tone(110, 'sawtooth', 0.38, 0.14, 0.00);
        tone( 82, 'sawtooth', 0.38, 0.28, 0.14);
      },
      levelUp: () => {
        tone(330, 'sine', 0.28, 0.10, 0.00);
        tone(392, 'sine', 0.28, 0.10, 0.11);
        tone(523, 'sine', 0.32, 0.18, 0.22);
      },
    };

    /* ── Difficulty ────────────────────────────────────────────────────── */
    const diffKey = getDifficulty();
    const DIFF = ({
      easy:   { stepDur: 750, stepGap: 200, preDelay: 900 },
      normal: { stepDur: 560, stepGap: 150, preDelay: 650 },
      hard:   { stepDur: 380, stepGap: 100, preDelay: 450 },
    })[diffKey] ?? { stepDur: 560, stepGap: 150, preDelay: 650 };

    /* ── State ─────────────────────────────────────────────────────────── */
    let state     = 'idle'; // idle | showing | waiting | gameover
    let sequence  = [];
    let playerIdx = 0;
    let muted     = false;
    let bestScore = 0;

    /* ── DOM refs ──────────────────────────────────────────────────────── */
    const btns         = [0,1,2,3].map(i => document.getElementById(`btn-${i}`));
    const roundDisplay = document.getElementById('roundDisplay');
    const bestDisplay  = document.getElementById('bestDisplay');
    const statusEl     = document.getElementById('status-text');
    const overlay      = document.getElementById('overlay');
    const finalRoundEl = document.getElementById('finalRound');
    const overlayBest  = document.getElementById('overlay-best');
    const startBtn     = document.getElementById('startBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const muteBtn      = document.getElementById('muteBtn');

    /* ── Helpers ───────────────────────────────────────────────────────── */
    const wait = ms => new Promise(r => setTimeout(r, ms));

    function setStatus(msg, cls = '') {
      statusEl.className = cls;
      statusEl.textContent = msg;
    }

    function setBtnsEnabled(on) {
      btns.forEach(b => { b.disabled = !on; });
    }

    async function flashBtn(idx) {
      btns[idx].classList.add('lit');
      sfx.button(idx);
      await wait(DIFF.stepDur);
      btns[idx].classList.remove('lit');
      await wait(DIFF.stepGap);
    }

    /* ── Game logic ────────────────────────────────────────────────────── */
    async function startGame() {
      // Resume audio context if suspended (needed on mobile)
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      sequence  = [];
      playerIdx = 0;
      state     = 'showing';

      overlay.classList.remove('visible');
      startBtn.textContent = 'RESTART';
      setBtnsEnabled(false);
      roundDisplay.textContent = '0';
      setStatus('Get ready…', 'watching');

      await wait(600);
      await nextRound();
    }

    async function nextRound() {
      sequence.push(Math.floor(Math.random() * 4));
      roundDisplay.textContent = String(sequence.length);
      state = 'showing';
      setStatus('Watch…', 'watching');
      setBtnsEnabled(false);

      await wait(DIFF.preDelay);
      await showSequence();
    }

    async function showSequence() {
      for (let i = 0; i < sequence.length; i++) {
        await flashBtn(sequence[i]);
      }
      await wait(250);
      playerIdx = 0;
      state     = 'waiting';
      setStatus('Your turn!', 'your-turn');
      setBtnsEnabled(true);
    }

    async function handleBtnClick(idx) {
      if (state !== 'waiting') return;

      // Disable during this click's processing
      setBtnsEnabled(false);
      await flashBtn(idx);

      if (idx !== sequence[playerIdx]) {
        await gameOver();
        return;
      }

      playerIdx++;

      if (playerIdx === sequence.length) {
        // Full sequence matched — celebrate and move on
        setStatus('Correct!', 'correct');
        sfx.levelUp();
        await wait(700);
        state = 'showing';
        await nextRound();
      } else {
        // More buttons to go
        setBtnsEnabled(true);
      }
    }

    async function gameOver() {
      state = 'gameover';
      setBtnsEnabled(false);

      // Wrong-sound + flash all buttons
      sfx.wrong();
      btns.forEach(b => b.classList.add('wrong'));
      await wait(500);
      btns.forEach(b => b.classList.remove('wrong'));

      setStatus('Game over!', 'gameover');

      // Score = rounds successfully completed (sequence.length - 1 since we failed the current)
      const score = sequence.length - 1;

      if (score > bestScore) {
        bestScore = score;
        bestDisplay.textContent = String(bestScore);
      }

      finalRoundEl.textContent = sequence.length;

      // Show new-best message in overlay
      if (score > 0 && score === bestScore) {
        overlayBest.textContent = `★ NEW BEST: ${bestScore} ★`;
      } else {
        overlayBest.textContent = bestScore > 0 ? `BEST: ${bestScore}` : '';
      }

      // Persist high score
      const rank = saveScore('simon', score, diffKey);
      if (rank > 0) {
        showHighScoreBanner(rank);
        setTimeout(() => playHighScoreChime(muted), 750);
      }

      await wait(350);
      overlay.classList.add('visible');
    }

    /* ── Event listeners ───────────────────────────────────────────────── */
    btns.forEach((btn, idx) => {
      btn.addEventListener('click', () => handleBtnClick(idx));
    });

    startBtn.addEventListener('click', () => {
      // Kick AudioContext on first user interaction
      getAudio();
      startGame();
    });

    playAgainBtn.addEventListener('click', startGame);

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.textContent = muted ? '✕ SFX' : '♪ SFX';
      muteBtn.classList.toggle('muted', muted);
    });

    /* ── Init ──────────────────────────────────────────────────────────── */
    setStatus('Press START to play');
    bestDisplay.textContent = '0';
  </script>
</body>
</html>
