<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Difficulty System Example</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .game-container {
            width: 100%;
            max-width: 600px;
        }
        .difficulty-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .difficulty-indicator.easy { border-color: #22c55e; color: #22c55e; }
        .difficulty-indicator.normal { border-color: #3b82f6; color: #3b82f6; }
        .difficulty-indicator.hard { border-color: #ef4444; color: #ef4444; }
        .game-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }
        .game-canvas {
            width: 100%;
            aspect-ratio: 1;
            background: #1a1a1a;
            border-radius: 12px;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
        }
        .moving-box {
            position: absolute;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            transition: all 0.1s linear;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .stat-card {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }
        .controls {
            margin-top: 1.5rem;
            text-align: center;
        }
        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .info {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="difficulty-indicator" id="difficultyIndicator">Difficulty: Normal</div>

        <h1 class="game-title">Difficulty Demo</h1>

        <div class="game-canvas" id="gameCanvas">
            <div class="moving-box" id="movingBox"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Speed</div>
                <div class="stat-value" id="speedValue">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Box Size</div>
                <div class="stat-value" id="sizeValue">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Multiplier</div>
                <div class="stat-value" id="multiplierValue">--</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="window.location.href='index.html'">
                ← Back to Hub
            </button>
        </div>

        <div class="info">
            The box speed, size, and score multiplier change based on the difficulty you selected on the hub.
        </div>
    </div>

    <script type="module">
        import { getDifficulty, getDifficultyConfig } from './utils/difficulty.js';

        // Get current difficulty
        const difficulty = getDifficulty();

        // Example game config (you could also use getDifficultyConfig for a specific game)
        const difficultyConfigs = {
            easy: { speed: 2, boxSize: 80, multiplier: 1.0 },
            normal: { speed: 4, boxSize: 60, multiplier: 1.5 },
            hard: { speed: 7, boxSize: 40, multiplier: 2.0 }
        };

        const config = difficultyConfigs[difficulty];

        // Update UI
        const indicator = document.getElementById('difficultyIndicator');
        indicator.textContent = `Difficulty: ${difficulty.toUpperCase()}`;
        indicator.className = `difficulty-indicator ${difficulty}`;

        document.getElementById('speedValue').textContent = `${config.speed}px/frame`;
        document.getElementById('sizeValue').textContent = `${config.boxSize}px`;
        document.getElementById('multiplierValue').textContent = `${config.multiplier}x`;

        // Animate the box
        const canvas = document.getElementById('gameCanvas');
        const box = document.getElementById('movingBox');

        let x = 0;
        let y = 0;
        let dx = config.speed;
        let dy = config.speed;

        box.style.width = `${config.boxSize}px`;
        box.style.height = `${config.boxSize}px`;

        function animate() {
            const maxX = canvas.offsetWidth - config.boxSize;
            const maxY = canvas.offsetHeight - config.boxSize;

            x += dx;
            y += dy;

            // Bounce off walls
            if (x <= 0 || x >= maxX) {
                dx = -dx;
                x = Math.max(0, Math.min(maxX, x));
            }
            if (y <= 0 || y >= maxY) {
                dy = -dy;
                y = Math.max(0, Math.min(maxY, y));
            }

            box.style.left = `${x}px`;
            box.style.top = `${y}px`;

            requestAnimationFrame(animate);
        }

        // Start animation
        animate();

        // Also demonstrate getting config for specific games
        console.log('Snake config:', getDifficultyConfig('snake'));
        console.log('Tetris config:', getDifficultyConfig('tetris'));
        console.log('Breakout config:', getDifficultyConfig('breakout'));
    </script>
</body>
</html>
